# render.yaml — Blueprint de Render.com
# Render inyecta DATABASE_URL automáticamente desde el bloque "databases".

services:
  - type: web
    name: blog-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blog-db
          property: connectionString

databases:
  - name: blog-db
    databaseName: blogdb
    plan: free
    region: oregon
